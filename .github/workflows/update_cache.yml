name: Update Global Transit Route Cache

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

concurrency:
  group: "route-cache-updater"
  cancel-in-progress: true

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Execute Cache Builder
        run: python update_cache.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git status --porcelain | grep -q "global_routes_cache.json"; then
            git add global_routes_cache.json
            git commit -m "Automated cache update: New routes discovered and added"
            git push
          else
            echo "No missing routes discovered. Static cache remains perfectly synchronized."
          fi
