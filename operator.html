<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division Profile | Swift Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="swift-base">

    <header class="site-header">
        <div class="container header-container">
            <button class="mobile-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="brand-logo">
                <a href="index.html">
                    <img id="dynamic-logo" src="Swift Connect Icon Black.png" alt="Swift Connect Logo" class="nav-logo">
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="divisions.html">Our Divisions</a></li>
                    <li><a href="map.html">Network Map</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-section operator-banner">
        <div class="container">
            <div class="banner-flex">
                <div>
                    <span class="badge" id="operator-badge-code">Loading...</span>
                    <h1 id="operator-title-name">Querying Division...</h1>
                </div>
                <div id="logo-branding-container">
                    <img id="branding-accent" src="Swift Connect Long White.png" alt="" class="branding-accent-img">
                </div>
            </div>
        </div>
    </section>

    <main class="container page-content">
        <div class="card data-display-card">
            <div id="api-loading-state" class="loading-spinner-box">
                <p>Querying the database network... Please wait.</p>
            </div>

            <div id="api-error-state" class="error-box hidden">
                <p>Failed to load division details.</p>
                <a href="divisions.html" class="btn-secondary">Return to Divisions Directory</a>
            </div>

            <div id="api-data-results" class="hidden">
                <!-- Javascript fills these in automatically with the new separated layouts -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid" style="grid-template-columns: 1fr; text-align: center;">
            <div class="footer-col brand-col" style="align-items: center;">
                <img src="Swift Connect White Full.png" alt="Swift Group Icon" class="footer-logo">
                <h3>Swift Connect Group</h3>
                <p class="copyright" style="margin-top: 20px;">&copy; 2026 Swift Connect Ltd. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
