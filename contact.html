<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Swift Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="swift-base">

    <header class="site-header">
        <div class="container header-container">
            <button class="mobile-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="brand-logo">
                <a href="index.html">
                    <img id="dynamic-logo" src="Swift Connect Icon Black.png" alt="Swift Connect Logo" class="nav-logo">
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="divisions.html">Our Divisions</a></li>
                    <li><a href="map.html">Network Map</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="simple-page-header">
        <div class="container">
            <h1>Contact Us</h1>
        </div>
    </div>

    <main class="container simple-page-content" style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <h2>Get in Touch</h2>
            <form style="margin-top: 20px;" onsubmit="event.preventDefault(); alert('Message Sent!');">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px;" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid" style="grid-template-columns: 1fr; text-align: center;">
            <div class="footer-col brand-col" style="align-items: center;">
                <img src="Swift Connect White Full.png" alt="Swift Group Icon" class="footer-logo">
                <h3>Swift Connect Group</h3>
                <p class="copyright" style="margin-top: 20px;">&copy; 2026 Swift Connect Ltd. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
